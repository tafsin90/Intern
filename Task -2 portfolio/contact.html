<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contact_style.css">
    <title>Home Page</title>
</head>
<body>
    <div class="navbar">
        <div class="name">Tafsin</div>
        <div class="option">
            <a href="index.html">Home</a>
            <a href="skills.html">Skills</a>
        </div>
        <div class="contact">
            <a href="contact.html">Contact</a>
        </div>
    </div>
    

   <div class="contact-div">
        <div class="left">
            <h1>Lets have a chat</h1>
            <form>
                <label for="name">Name:</label><br>
                <input id="frm" type="text" name="name" placeholder="Enter your full name"><br>

                <label for="email">Email:</label><br>
                <input id="frm" type="email"name="email" placeholder="Enter your E-mail address"><br>

                <label for="message">Message:</label><br>
                <textarea id="frm" name="message" placeholder="Type your message..."  rows="4"></textarea><br>

                <input id="btn" type="submit" value="Send">
            </form>
        </div>

        <div class="right">
            <img src="mee.jpg">
        </div>
   </div>


    <footer>
        <div class="footer">
            <p>Created with ❤️ by Tafsin</p>
            <p>Copyright &copy; 2025</p>
        </div>
    </footer>
</body>
</html>
